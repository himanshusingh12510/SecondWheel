{% extends "base.html" %}
{% block content %}

<div class="card">
  <div class="card-pad" style="max-width:520px; margin:0 auto;">
    <h2 style="margin:0 0 14px;">Register</h2>

    <form method="POST" action="/register">
      <label>Name</label>
      <input class="input" name="name" required>

      <div style="height:10px;"></div>

      <label>Email</label>
      <input class="input" name="email" type="email" required>

      <div style="height:10px;"></div>

      <label>Password</label>
      <input class="input" name="password" type="password" required>

      <div style="margin-top:14px;">
        <button class="btn success" type="submit" style="width:100%;">Create Account</button>
      </div>
    </form>

    <p class="muted" style="margin-top:12px;">
      Already have an account? <a class="btn" href="/login" style="padding:6px 10px;">Login</a>
    </p>
  </div>
</div>

{% endblock %}
